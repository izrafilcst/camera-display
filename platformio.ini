; PlatformIO wrapper around the existing ESP-IDF project.
; All component logic lives in main/ and components/* with their own
; CMakeLists.txt — this file only tells PlatformIO how to drive the
; build / flash / monitor against the ESP32-S3-N16R8.
;
; Common targets:
;   pio run                              -> build
;   pio run -t menuconfig                -> Kconfig (set CONFIG_RECEIVER_PEER_MAC here)
;   pio run -t upload                    -> flash
;   pio device monitor                   -> serial monitor
;   pio run -t upload -t monitor         -> flash + monitor in one shot
;   pio run -t clean                     -> clean build dir
;   pio run -t fullclean                 -> nuke .pio/

[platformio]
default_envs = esp32s3-n16r8
; ESP-IDF layout: sources live under main/, not src/. Point PIO at it
; so the missing-src precheck doesn't fail.
src_dir = main

[env:esp32s3-n16r8]
platform = espressif32
framework = espidf
; Generic S3 DevKit board profile; we override PSRAM/flash to match the N16R8.
board = esp32-s3-devkitc-1

; --- N16R8: 16 MB QIO flash + 8 MB Octal PSRAM @ 80 MHz ---
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.psram_type = opi
board_build.partitions = partitions.csv

; --- Build flags / SDK config ---
; We rely on sdkconfig.defaults for the bulk of the config (PSRAM, brownout,
; stack canaries, etc.). Anything we want PlatformIO to know goes here.
build_flags =
    -DBOARD_HAS_PSRAM

; --- Upload / monitor ---
; Adjust upload_port to your USB device (typically /dev/ttyUSB0 or /dev/ttyACM0).
; Leave commented to let PlatformIO auto-detect.
; upload_port = /dev/ttyUSB0
; monitor_port = /dev/ttyUSB0
upload_speed = 921600
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time
